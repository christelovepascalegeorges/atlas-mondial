<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Atlas Mondial Interactif</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1>🌎 Atlas Mondial Interactif</h1>
    <p>Découvrez les informations essentielles de chaque pays</p>
</header>


<nav>
    <a href="#">Accueil</a>
    <a href="#">Pays</a>
    <a href="#">Atlas</a>
</nav>


<main>

    <section class="search-section">

        <h2>Rechercher un pays</h2>

        <form id="country-form">

            <label for="country-input">
                Nom du pays :
            </label>

            <input 
                type="text" 
                id="country-input"
                name="country"
                placeholder="Exemple : Haiti"
                aria-describedby="error-message"
            >

            <button type="submit">
                Rechercher
            </button>

        </form>


        <p id="error-message"></p>


    </section>



    <section class="result-section">

        <div id="loading">
            Chargement...
        </div>


        <div id="country-card">

        </div>


    </section>


</main>


<footer>

    <p>
        © 2026 Atlas Mondial Interactif - Projet Web
    </p>

</footer>



<script src="js/app.js"></script>

</body>

</html>
